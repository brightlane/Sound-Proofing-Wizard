  function calculateSTC() {
    const l = parseFloat(document.getElementById('length').value);
    const w = parseFloat(document.getElementById('width').value);
    const h = parseFloat(document.getElementById('height').value);
    const mat = document.getElementById('material').value;
    const walls = (l * h * 2 + w * h * 2);
    let stc, cost;
    if (mat === 'mlv') { stc = 25; cost = 2.25; }
    else if (mat === 'green-glue') { stc = 18; cost = 3; }
    else { stc = 45; cost = 4.5; }
    const total = (walls * cost).toFixed(0);
    document.getElementById('result').innerHTML = `STC Boost: +${stc}<br>Area: ${walls.toFixed(0)} sq ft<br>Cost: $${total}`;
    document.getElementById('result').style.display = 'block';
  }
